# Change prefix to Ctrl-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Start numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Set history limit and enable mouse support
set -g history-limit 100000
set -g mouse on
set -g xterm-keys on 

# Better split bindings
# Split with percentages
bind | split-window -h -p 30   # right pane gets 30%
bind - split-window -v -p 30   # bottom pane gets 30%

# Easier pane switching with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize with Ctrl + arrow (without prefix)
bind -n -r C-h resize-pane -L 5
bind -n -r C-j resize-pane -D 5
bind -n -r C-k resize-pane -U 5
bind -n -r C-l resize-pane -R 5

# Easier reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
